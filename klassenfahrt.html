<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klassenfahrt – Der Podcast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00e5ff;
    --cyan-dark: #0098b0;
    --bg: #0a0e1a;
    --card-bg: rgba(255,255,255,0.05);
    --text: #f0f4ff;
    --glow: 0 0 20px rgba(0,229,255,0.5), 0 0 60px rgba(0,229,255,0.2);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated star background */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .stars::before, .stars::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 50% 80%, rgba(0,229,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 90% 60%, rgba(0,229,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 40%, rgba(255,255,255,0.5) 0%, transparent 100%);
    background-size: 100% 100%;
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  .stars::after {
    background-image:
      radial-gradient(1px 1px at 35% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 75% 85%, rgba(0,229,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 55% 25%, rgba(0,229,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 35%, rgba(255,255,255,0.6) 0%, transparent 100%);
    animation-delay: 2s;
    animation-duration: 3s;
  }
  @keyframes twinkle {
    from { opacity: 0.5; }
    to { opacity: 1; }
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* COVER */
  .cover-wrap {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,229,255,0.35), 0 20px 60px rgba(0,0,0,0.8);
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease both;
  }
  .cover-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    border: 2px solid rgba(0,229,255,0.4);
    pointer-events: none;
  }
  .cover-wrap img {
    width: 100%;
    display: block;
  }

  /* HEADLINE */
  .headline {
    text-align: center;
    margin-bottom: 10px;
    animation: fadeUp 0.8s 0.15s ease both;
  }
  .headline h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    letter-spacing: 4px;
    color: var(--cyan);
    text-shadow: var(--glow);
    line-height: 1;
  }
  .headline p {
    font-size: 1.05rem;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px 0;
    animation: fadeUp 0.8s 0.25s ease both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.5), transparent);
  }
  .divider span {
    font-family: 'Bangers', cursive;
    font-size: 0.9rem;
    letter-spacing: 4px;
    color: var(--cyan);
    opacity: 0.7;
  }

  /* PLATFORM GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 16px;
  }

  .platform-card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    backdrop-filter: blur(8px);
    animation: fadeUp 0.7s ease both;
    overflow: hidden;
  }
  .platform-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-color, transparent) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 14px;
  }
  .platform-card:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--accent-color, rgba(0,229,255,0.4));
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px var(--accent-color, rgba(0,229,255,0.2));
  }
  .platform-card:hover::before {
    opacity: 0.08;
  }

  .platform-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    padding: 6px;
  }
  .platform-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .platform-info {
    flex: 1;
    min-width: 0;
  }
  .platform-info strong {
    display: block;
    font-size: 1rem;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .platform-info span {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .arrow {
    color: rgba(255,255,255,0.25);
    font-size: 1.2rem;
    transition: transform 0.2s, color 0.2s;
  }
  .platform-card:hover .arrow {
    transform: translateX(4px);
    color: var(--accent-color, var(--cyan));
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* stagger cards */
  .platform-card:nth-child(1) { animation-delay: 0.3s; }
  .platform-card:nth-child(2) { animation-delay: 0.4s; }
  .platform-card:nth-child(3) { animation-delay: 0.5s; }
  .platform-card:nth-child(4) { animation-delay: 0.6s; }
  .platform-card:nth-child(5) { animation-delay: 0.7s; }

  footer {
    text-align: center;
    margin-top: 60px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  @media (max-width: 540px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
